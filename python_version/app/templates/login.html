<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Students Management & Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: #667eea;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-control {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            color: white;
        }
        .error-alert {
            display: none;
            margin-bottom: 20px;
        }
        .loading {
            display: none;
        }
        .spinner-border {
            width: 1rem;
            height: 1rem;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>📚 SMS</h1>
            <p>Students Management & Attendance System</p>
        </div>
        
        <div id="error-alert" class="alert alert-danger error-alert" role="alert">
            <span id="error-message"></span>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
                <small class="form-text text-muted">Enter your username</small>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
                <small class="form-text text-muted">Enter your password</small>
            </div>
            
            <button type="submit" class="btn btn-login">
                <span class="loading">
                    <span class="spinner-border" role="status" aria-hidden="true"></span>
                    Logging in...
                </span>
                <span class="btn-text">Login</span>
            </button>
        </form>
        
        <div style="margin-top: 20px; text-align: center; font-size: 12px; color: #666;">
            <p>Demo Credentials:</p>
            <p><strong>Admin:</strong> admin123 / password</p>
            <p><strong>Teacher:</strong> teacher_john / password</p>
            <p><strong>Student:</strong> student_alice / password</p>
        </div>
    </div>
    
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('error-alert');
            const errorMessage = document.getElementById('error-message');
            const loadingSpan = document.querySelector('.loading');
            const btnText = document.querySelector('.btn-text');
            
            // Show loading state
            loadingSpan.style.display = 'inline';
            btnText.style.display = 'none';
            errorAlert.style.display = 'none';
            
            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMessage.textContent = data.error || 'Login failed';
                    errorAlert.style.display = 'block';
                    loadingSpan.style.display = 'none';
                    btnText.style.display = 'inline';
                }
            } catch (error) {
                errorMessage.textContent = 'An error occurred: ' + error.message;
                errorAlert.style.display = 'block';
                loadingSpan.style.display = 'none';
                btnText.style.display = 'inline';
            }
        });
    </script>
</body>
</html>
