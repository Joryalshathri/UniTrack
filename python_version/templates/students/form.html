{% extends 'base.html' %}
{% block title %}Student Form - UniTrack{% endblock %}
{% block content %}
<div class="row mt-5">
    <div class="col-md-6 offset-md-3">
        <h2>{{ 'Edit Student' if student else 'Add New Student' }}</h2>
        <div class="card mt-3">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Enrollment Number *</label>
                        <input type="text" class="form-control" name="enrollment_number" value="{{ student.enrollment_number if student else '' }}" {{ 'readonly' if student else '' }} required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">First Name *</label>
                        <input type="text" class="form-control" name="first_name" value="{{ student.first_name if student else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last Name *</label>
                        <input type="text" class="form-control" name="last_name" value="{{ student.last_name if student else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" name="email" value="{{ student.email if student else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" name="phone" value="{{ student.phone if student else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" name="date_of_birth" value="{{ student.date_of_birth if student else '' }}">
                    </div>
                    <button type="submit" class="btn btn-primary">{{ 'Update' if student else 'Create' }}</button>
                    <a href="/students" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
